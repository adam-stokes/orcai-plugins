# orcai sidecar descriptor for the OpenCode provider plugin.
#
# Install: copy this file to ~/.config/orcai/wrappers/opencode.yaml
# and ensure `orcai-opencode` is on $PATH (run `make install`).
#
# Calling convention:
#   input  — the prompt text, passed as stdin to orcai-opencode
#   vars   — key/value pairs; the orcai runner passes vars.model as --model <value>
#
# Supported vars (set in pipeline step `vars:` block):
#   model  (required) — Model in provider/model format, e.g. "ollama/llama3.2"
#                       Passed to orcai-opencode as --model <value>.
#                       Can also be provided as ORCAI_MODEL env var.
#
# Example pipeline step:
#   - id: agent
#     plugin: opencode
#     prompt: "Refactor this function to use error wrapping."
#     vars:
#       model: ollama/llama3.2

name: opencode
description: "Agentic AI coding assistant via opencode (https://opencode.ai)"
command: orcai-opencode
